name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HVAKR.Revit.sln

      - name: Build
        run: dotnet build HVAKR.Revit.sln --configuration Debug --no-restore

      - name: Test
        run: dotnet test HVAKR.Api.Tests/HVAKR.Api.Tests.csproj --configuration Debug --no-build --verbosity normal

      - name: Install Inno Setup
        if: github.event_name == 'pull_request'
        run: choco install innosetup --no-progress --yes

      - name: Build 0.1.0 test installer
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          dotnet msbuild HVAKR.Revit/HVAKR.Revit.csproj /t:BuildInstaller /p:Configuration=Release /p:VersionPrefix=0.1.0 /p:VersionSuffix= /p:Version=0.1.0 /p:InformationalVersion=0.1.0
          Copy-Item HVAKR.Revit/Deploy/Installer/HVAKR-Revit-Plugin-0.1.0.exe artifacts/HVAKR-Revit-Plugin-0.1.0.exe

      - name: Build 0.1.1 upgrade test installer
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: dotnet msbuild HVAKR.Revit/HVAKR.Revit.csproj /t:BuildInstaller /p:Configuration=Release /p:VersionPrefix=0.1.1 /p:VersionSuffix= /p:Version=0.1.1 /p:InformationalVersion=0.1.1

      - name: Smoke-test per-user install, upgrade, and uninstall
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: ./scripts/Test-Installer.ps1 -FirstInstaller artifacts/HVAKR-Revit-Plugin-0.1.0.exe -UpgradeInstaller HVAKR.Revit/Deploy/Installer/HVAKR-Revit-Plugin-0.1.1.exe

      - name: Smoke-test all-users installer migration
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: ./scripts/Test-Installer.ps1 -FirstInstaller artifacts/HVAKR-Revit-Plugin-0.1.0.exe -UpgradeInstaller HVAKR.Revit/Deploy/Installer/HVAKR-Revit-Plugin-0.1.1.exe -AllUsers
